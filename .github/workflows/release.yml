name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
          - name: linux-x86_64
            os: ubuntu-24.04
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: windows-x86_64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          df -h

      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install runtime deps
        run: uv sync --no-dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Derive version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary (unix)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller --onedir --name mondo --paths src \
            --collect-data mondo.help --hidden-import mondo.help \
            --collect-data mondo.skill --hidden-import mondo.skill \
            --collect-submodules mondo.cli --collect-submodules mondo.output \
            src/mondo/cli/main.py

      - name: Build binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv run pyinstaller --onedir --name mondo --paths src `
            --collect-data mondo.help --hidden-import mondo.help `
            --collect-data mondo.skill --hidden-import mondo.skill `
            --collect-submodules mondo.cli --collect-submodules mondo.output `
            --collect-data tzdata `
            src/mondo/cli/main.py

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          ./dist/mondo/mondo --version
          ./dist/mondo/mondo --help > /dev/null
          ./dist/mondo/mondo help codecs > /dev/null
          ./dist/mondo/mondo skill install --global
          test -f "$HOME/.claude/skills/mondo/SKILL.md"

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\dist\mondo\mondo.exe --version
          .\dist\mondo\mondo.exe --help | Out-Null
          .\dist\mondo\mondo.exe help codecs | Out-Null
          .\dist\mondo\mondo.exe skill install --global | Out-Null
          if (-not (Test-Path "$HOME/.claude/skills/mondo/SKILL.md")) { throw "SKILL.md missing" }
          # Verify `--collect-data tzdata` bundled the IANA tz database the
          # world_clock codec needs (Windows has no system zoneinfo source).
          $tz = Get-ChildItem -Recurse -Path .\dist\mondo -Filter London -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'zoneinfo' } | Select-Object -First 1
          if (-not $tz) { throw "bundled tzdata zoneinfo data missing from onedir (--collect-data tzdata regressed)" }

      - name: Archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="mondo-${{ steps.ver.outputs.version }}-${{ matrix.name }}.tar.gz"
          # Use Python's tarfile to avoid system tar/gzip issues on Linux runners.
          ARCHIVE="$archive" python3 -c "import os,tarfile; t=tarfile.open(os.environ['ARCHIVE'],'w:gz'); t.add('dist/mondo',arcname='mondo'); t.close(); print('created',os.environ['ARCHIVE'])"
          # The formula, README and release notes all assume a single
          # top-level mondo/ entry — fail fast if the layout drifts.
          ARCHIVE="$archive" python3 -c "import os,tarfile; m=tarfile.open(os.environ['ARCHIVE']).getmembers(); first=m[0].name.rstrip('/'); assert first=='mondo',f'unexpected layout: {first}'"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "mondo-${{ steps.ver.outputs.version }}-${{ matrix.name }}.zip"
          Compress-Archive -Path dist\mondo -DestinationPath $archive
          # Same layout assumption as the tarballs: everything under a
          # single top-level mondo/ entry. bsdtar on the runner reads zips;
          # Compress-Archive may emit backslash separators, accept both.
          $first = (tar -tf $archive | Select-Object -First 1)
          if ($first -notmatch '^mondo([\\/]|$)') { throw "unexpected zip layout: first entry '$first'" }
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v7
        with:
          name: mondo-${{ matrix.name }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum mondo-*.tar.gz mondo-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tags with a hyphen (e.g. v0.4.0-rc1, v1.0.0-beta.2) are pre-releases.
          prerelease_flag=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          notes="**Packaging note:** archives contain a \`mondo/\` directory \
          (PyInstaller onedir). Extract it somewhere permanent and symlink \
          \`mondo/mondo\` onto your PATH; \`brew install\` handles this \
          automatically."
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$notes" \
            --verify-tag \
            $prerelease_flag \
            artifacts/mondo-*.tar.gz artifacts/mondo-*.zip artifacts/SHA256SUMS.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-24.04
    # Skip the tap update on pre-release tags (e.g. v0.4.0-rc1). Otherwise
    # `brew upgrade mondo` would pull in release candidates as the stable
    # version. Pre-release tags still produce a GitHub Release with assets,
    # just not an update to the Homebrew formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets
          cd assets
          v="${{ steps.ver.outputs.version }}"
          for asset in \
              "mondo-$v-darwin-arm64.tar.gz" \
              "mondo-$v-linux-arm64.tar.gz" \
              "mondo-$v-linux-x86_64.tar.gz"; do
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$asset"
          done

      - name: Compute SHA256s
        id: sha
        run: |
          cd assets
          v="${{ steps.ver.outputs.version }}"
          {
            echo "darwin_arm64=$(sha256sum "mondo-$v-darwin-arm64.tar.gz" | cut -d' ' -f1)"
            echo "linux_arm64=$(sha256sum "mondo-$v-linux-arm64.tar.gz" | cut -d' ' -f1)"
            echo "linux_x86_64=$(sha256sum "mondo-$v-linux-x86_64.tar.gz" | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v5
        with:
          repository: zoltanf/homebrew-mondo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64 }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/mondo.rb <<EOF
          class Mondo < Formula
            desc "Power-user CLI for the monday.com GraphQL API"
            homepage "https://github.com/zoltanf/mondo"
            version "$VERSION"
            license "MIT"

            on_macos do
              depends_on arch: :arm64
              url "https://github.com/zoltanf/mondo/releases/download/v$VERSION/mondo-$VERSION-darwin-arm64.tar.gz"
              sha256 "$DARWIN_ARM64"
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/zoltanf/mondo/releases/download/v$VERSION/mondo-$VERSION-linux-arm64.tar.gz"
                sha256 "$LINUX_ARM64"
              else
                url "https://github.com/zoltanf/mondo/releases/download/v$VERSION/mondo-$VERSION-linux-x86_64.tar.gz"
                sha256 "$LINUX_X86_64"
              end
            end

            def install
              # Homebrew strips the tarball's single top-level \`mondo/\`
              # directory, leaving the onedir contents at the stage root.
              libexec.install Dir["*"]
              bin.install_symlink libexec/"mondo"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mondo --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mondo.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
            exit 0
          fi
          git commit -m "mondo ${{ steps.ver.outputs.version }}"
          git push

  update-scoop:
    needs: release
    runs-on: ubuntu-24.04
    # Skip the bucket update on pre-release tags, same reasoning as the
    # Homebrew tap: `scoop update mondo` should only pull stable versions.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets
          cd assets
          v="${{ steps.ver.outputs.version }}"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "mondo-$v-windows-x86_64.zip"

      - name: Compute SHA256
        id: sha
        run: |
          cd assets
          v="${{ steps.ver.outputs.version }}"
          echo "windows_x86_64=$(sha256sum "mondo-$v-windows-x86_64.zip" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout bucket repo
        uses: actions/checkout@v5
        with:
          repository: zoltanf/scoop-mondo
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: bucket

      - name: Render manifest
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          WINDOWS_X86_64: ${{ steps.sha.outputs.windows_x86_64 }}
        run: |
          mkdir -p bucket/bucket
          cat > bucket/bucket/mondo.json <<EOF
          {
              "version": "$VERSION",
              "description": "Power-user CLI for the monday.com GraphQL API",
              "homepage": "https://github.com/zoltanf/mondo",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/zoltanf/mondo/releases/download/v$VERSION/mondo-$VERSION-windows-x86_64.zip",
                      "hash": "$WINDOWS_X86_64"
                  }
              },
              "bin": "mondo\\\\mondo.exe",
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/zoltanf/mondo/releases/download/v\$version/mondo-\$version-windows-x86_64.zip"
                      }
                  }
              }
          }
          EOF

      - name: Commit and push
        working-directory: bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/mondo.json
          if git diff --cached --quiet; then
            echo "manifest unchanged"
            exit 0
          fi
          git commit -m "mondo ${{ steps.ver.outputs.version }}"
          git push
